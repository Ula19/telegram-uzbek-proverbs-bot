x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Бот мақолов
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  # Автоперезапуск unhealthy контейнеров
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_proverbs}
      POSTGRES_USER: ${DB_USER:-bot_4_proverbs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_4_proverbs} -d ${DB_NAME:-bot_4_proverbs}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  postgres-data:
